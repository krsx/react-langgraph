services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      OLLAMA_BASE_URL: http://ollama:11434
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      WORKSPACE_USER_EMAIL: ${WORKSPACE_USER_EMAIL:-}
      WORKSPACE_MCP_URL: ${WORKSPACE_MCP_URL:-}
      WORKSPACE_MCP_COMMAND: ${WORKSPACE_MCP_COMMAND:-workspace-mcp}
      WORKSPACE_MCP_ARGS: ${WORKSPACE_MCP_ARGS:---single-user --tool-tier core --permissions gmail:send calendar:full}
      WORKSPACE_MCP_CREDENTIALS_DIR: /app/.google_workspace_mcp/credentials
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - ~/.google_workspace_mcp/credentials:/app/.google_workspace_mcp/credentials
      - workspace_mcp_tokens:/app/.google_workspace_mcp/tokens
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

